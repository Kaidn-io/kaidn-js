<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Kaidn SDK Playground</title>
<style>
  :root { color-scheme: dark; --bg:#0b0d10; --panel:#14171c; --line:#252a31; --ink:#e7ebf0; --ink2:#aab3bf; --muted:#6b7480; --accent:#5b9dff; --good:#3fb950; --warn:#d29922; --crit:#f85149; }
  * { box-sizing: border-box; }
  body { margin:0; background:var(--bg); color:var(--ink); font:14px/1.5 ui-sans-serif,system-ui,-apple-system,sans-serif; }
  .wrap { max-width:960px; margin:0 auto; padding:32px 20px 64px; }
  h1 { font-family:ui-monospace,monospace; font-size:22px; margin:0 0 4px; }
  p.sub { color:var(--ink2); margin:0 0 20px; }
  code { font-family:ui-monospace,monospace; }
  .grid { display:grid; grid-template-columns:1fr 1fr; gap:20px; } @media (max-width:760px){ .grid{grid-template-columns:1fr;} }
  .panel { background:var(--panel); border:1px solid var(--line); border-radius:14px; padding:18px; }
  label { display:block; font-size:12px; color:var(--ink2); margin-top:10px; }
  input { width:100%; margin-top:4px; padding:8px 10px; background:#0e1116; border:1px solid var(--line); border-radius:9px; color:var(--ink); font:13px ui-monospace,monospace; outline:none; }
  input:focus { border-color:var(--accent); }
  .row { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
  .chips { display:flex; gap:8px; flex-wrap:wrap; align-items:center; margin:0 0 4px; }
  button { cursor:pointer; border:1px solid var(--line); background:#0e1116; color:var(--ink2); border-radius:9px; padding:6px 12px; font-size:12px; }
  button:hover { color:var(--ink); }
  button.primary { background:var(--accent); color:#04101f; border-color:var(--accent); font-weight:600; width:100%; padding:10px; margin-top:14px; font-size:14px; }
  button.primary:disabled { opacity:.5; cursor:default; }
  .tabs { display:flex; gap:4px; border-bottom:1px solid var(--line); margin:-4px -4px 14px; padding:4px; }
  .tabs button { border:none; background:none; font-family:ui-monospace,monospace; }
  .tabs button.on { background:#0e1116; color:var(--ink); border-radius:7px; }
  pre { white-space:pre-wrap; word-break:break-word; font:12px/1.6 ui-monospace,monospace; color:var(--ink2); margin:0; }
  .verdict { display:inline-flex; align-items:center; gap:8px; font-family:ui-monospace,monospace; font-weight:600; padding:6px 12px; border-radius:9px; }
  .dot { width:8px; height:8px; border-radius:50%; }
  .reason { display:flex; gap:8px; margin-top:6px; font-size:13px; color:var(--ink2); }
  .w { background:#0e1116; border:1px solid var(--line); border-radius:5px; padding:1px 6px; font:11px ui-monospace,monospace; color:var(--accent); height:fit-content; }
  .muted { color:var(--muted); } .err { color:var(--crit); }
  .keyrow { margin-bottom:8px; }
</style>
</head>
<body>
<div class="wrap">
  <h1>Kaidn SDK Playground</h1>
  <p class="sub">Score events against the live API using <code>@kaidn/sdk</code>. Your key stays on this local server.</p>

  <div class="keyrow panel">
    <label>Your Kaidn API key <span class="muted">(kaidn_… — create one in your dashboard → API keys)</span></label>
    <input id="apiKey" type="password" placeholder="kaidn_live_…" value="%%ENV_KEY%%" />
  </div>

  <div class="grid">
    <div class="panel">
      <div class="chips">
        <span class="muted" style="font-size:12px">Quick fill:</span>
        <button onclick="preset('clean')">Clean user</button>
        <button onclick="preset('risky')">Likely fraud</button>
        <button onclick="clearFields()">clear</button>
      </div>
      <label>Event *</label>
      <input id="event" list="events" value="signup" />
      <datalist id="events">
        <option>signup</option><option>login</option><option>trial_start</option>
        <option>cashout</option><option>checkout</option><option>credit_redeem</option>
      </datalist>
      <div class="row">
        <label>User ID<input id="user_id" placeholder="u_8231" /></label>
        <label>IP address<input id="ip" placeholder="203.0.113.7" /></label>
        <label>Email<input id="email" placeholder="user@example.com" /></label>
        <label>Device ID <span class="muted" id="dhint"></span><input id="device_id" placeholder="fp_abc123" /></label>
        <label>Phone<input id="phone" placeholder="+14155551234" /></label>
        <label>Phone country<input id="phone_country" placeholder="US" /></label>
        <label>Event country<input id="event_country" placeholder="US" /></label>
        <label>IP country<input id="ip_country" placeholder="US" /></label>
      </div>
      <button class="primary" id="run" onclick="run()">Run score</button>
    </div>

    <div class="panel">
      <div class="tabs">
        <button class="on" data-tab="result" onclick="tab('result')">Result</button>
        <button data-tab="sdk" onclick="tab('sdk')">@kaidn/sdk</button>
        <button data-tab="curl" onclick="tab('curl')">cURL</button>
      </div>
      <div id="out"><p class="muted">Fill in an event and hit Run score.</p></div>
    </div>
  </div>
</div>

<script src="/fp.js"></script>
<script>
  const BASE_URL = "%%BASE_URL%%";
  const FIELDS = ["user_id","ip","email","device_id","phone","phone_country","event_country","ip_country"];
  const PRESETS = {
    clean: { event:"signup", user_id:"u_1001", ip:"8.8.8.8", email:"jane@gmail.com", event_country:"US", ip_country:"US" },
    risky: { event:"cashout", user_id:"u_9002", ip:"45.155.205.100", email:"x9f2kq@mailinator.com", device_id:"fp_farm01" },
  };
  let curTab = "result", lastResult = null;
  const $ = (id) => document.getElementById(id);

  function preset(k) {
    clearFields();
    const p = PRESETS[k];
    $("event").value = p.event || "signup";
    for (const f of FIELDS) if (p[f]) $(f).value = p[f];
  }
  function clearFields() { for (const f of FIELDS) $(f).value = ""; lastResult = null; render(); }
  function payload() {
    const b = { event: $("event").value.trim() || "signup" };
    for (const f of FIELDS) { const v = $(f).value.trim(); if (v) b[f] = v; }
    return b;
  }
  function tab(t) {
    curTab = t;
    document.querySelectorAll(".tabs button").forEach((x) => x.classList.toggle("on", x.dataset.tab === t));
    render();
  }
  async function run() {
    const apiKey = $("apiKey").value.trim();
    $("run").disabled = true; $("run").textContent = "Scoring…";
    try {
      const r = await fetch("/score", {
        method: "POST",
        headers: { "content-type": "application/json" },
        body: JSON.stringify({ apiKey, ...payload() }),
      });
      lastResult = await r.json();
      curTab = "result"; tab("result");
    } catch (e) {
      lastResult = { error: String(e) }; render();
    } finally {
      $("run").disabled = false; $("run").textContent = "Run score";
    }
  }
  function render() {
    const out = $("out");
    if (curTab !== "result") {
      out.innerHTML = "<pre>" + esc(snippet(curTab)) + "</pre>" +
        '<button style="margin-top:10px" onclick="copyPre(this)">copy</button>';
      return;
    }
    if (!lastResult) { out.innerHTML = '<p class="muted">Fill in an event and hit Run score.</p>'; return; }
    if (lastResult.error) { out.innerHTML = '<p class="err">' + esc(lastResult.error) + "</p>"; return; }
    const r = lastResult;
    const c = r.verdict === "allow" ? "var(--good)" : r.verdict === "review" ? "var(--warn)" : "var(--crit)";
    let h = '<div class="verdict" style="background:color-mix(in srgb,' + c + ' 15%,transparent);color:' + c + '">' +
      '<span class="dot" style="background:' + c + '"></span>' + esc(r.verdict) + "</div> " +
      '<b style="color:' + c + ';font-family:ui-monospace,monospace;font-size:20px">' + r.score +
      '<span class="muted" style="font-size:13px">/100</span></b>';
    if (r.reason_text) h += '<p style="color:var(--ink2);margin:10px 0">' + esc(r.reason_text) + "</p>";
    (r.checks || []).forEach((x) => {
      h += '<div class="reason"><span class="w">+' + x.weight + "</span><span><code>" + esc(x.reason) +
        "</code> — " + esc(x.message) + "</span></div>";
    });
    if (r.device) h += '<p class="muted" style="margin-top:12px;font-size:12px">device: ' + r.device.account_count +
      " account(s) · " + r.device.distinct_ips + " IP(s) · " + (r.device.connection_type || "—") +
      (r.device.ja4 ? " · JA4 seen" : "") + "</p>";
    h += '<p class="muted" style="margin-top:10px;font-size:11px">event_id: ' + esc(r.event_id || "") + "</p>";
    out.innerHTML = h;
  }
  function snippet(kind) {
    const p = payload();
    const j = JSON.stringify(p, null, 2);
    if (kind === "sdk") {
      return [
        'import { Kaidn } from "@kaidn/sdk";',
        "",
        "const kaidn = new Kaidn({ apiKey: process.env.KAIDN_API_KEY });",
        "",
        "const result = await kaidn.score(" + j + ");",
        'if (result.verdict === "block") denySignup(result.reasons);',
      ].join("\n");
    }
    return [
      "curl -X POST https://api.kaidn.io/v1/score \\",
      '  -H "x-api-key: $KAIDN_API_KEY" \\',
      '  -H "content-type: application/json" \\',
      "  -d '" + JSON.stringify(p) + "'",
    ].join("\n");
  }
  function copyPre(btn) {
    navigator.clipboard.writeText(btn.previousElementSibling.textContent);
    btn.textContent = "copied";
    setTimeout(() => (btn.textContent = "copy"), 1200);
  }
  function esc(s) { return String(s).replace(/[&<>]/g, (m) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;" }[m])); }

  // auto-detect the visitor's public IP (what Kaidn sees) — fill if empty
  fetch(BASE_URL + "/v1/ip")
    .then((r) => r.json())
    .then((d) => { if (d && d.ip && !$("ip").value) $("ip").value = d.ip; })
    .catch(() => {});

  // auto-detect a device_id via @kaidn/fp collect() — fill if empty
  if (window.KaidnFp && window.KaidnFp.collect) {
    $("dhint").textContent = "detecting…";
    window.KaidnFp.collect()
      .then((fp) => { if (!$("device_id").value) $("device_id").value = fp.device_id; $("dhint").textContent = "auto-detected"; })
      .catch(() => { $("dhint").textContent = ""; });
  }
</script>
</body>
</html>
